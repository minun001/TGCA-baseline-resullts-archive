name: Sync TGCA-baseline-resullts

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest site snapshot
        run: |
          mkdir -p data
          curl -fsSL http://114.71.219.49:8123/index.html -o index.html
          curl -fsSL http://114.71.219.49:8123/app.js -o app.js
          curl -fsSL http://114.71.219.49:8123/styles.css -o styles.css
          curl -fsSL http://114.71.219.49:8123/leaderboard_page.js -o leaderboard_page.js
          curl -fsSL http://114.71.219.49:8123/leaderboard-covla.html -o leaderboard-covla.html
          curl -fsSL http://114.71.219.49:8123/leaderboard-dashcam.html -o leaderboard-dashcam.html
          curl -fsSL http://114.71.219.49:8123/data/results.json -o data/results.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No site changes detected."
            exit 0
          fi
          git add .
          git commit -m "Sync site snapshot"
          git push
